# Rojas SDD Cycle — OpenSpec Configuration
# This profile configures OpenSpec for the Rojas two-layer workflow.

profile: rojas-sdd
workflows:
  - propose
  - explore
  - new
  - continue
  - apply
  - ff
  - sync
  - archive
  - bulk-archive
  - verify
  - onboard

settings:
  specs_dir: openspec/specs
  changes_dir: openspec/changes
  auto_archive: false
  require_verify_before_archive: true

